<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>جارٍ المصادقة...</title>
  <style>
    body { font-family: 'Segoe UI', sans-serif; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; background:#f0f4f8; }
    .box { background:#fff; border-radius:16px; padding:2rem 3rem; text-align:center; box-shadow:0 4px 24px rgba(0,0,0,0.1); }
    .spinner { width:40px; height:40px; border:4px solid #e2e8f0; border-top-color:#3b82f6; border-radius:50%; animation:spin 0.8s linear infinite; margin:0 auto 1rem; }
    @keyframes spin { to { transform:rotate(360deg); } }
    p { color:#4a5568; margin:0; font-size:1rem; }
  </style>
</head>
<body>
  <div class="box">
    <div class="spinner"></div>
    <p>جارٍ المصادقة مع Google Drive...</p>
  </div>
  <script>
    (function () {
      var hash   = new URLSearchParams(window.location.hash.replace(/^#/, ''));
      var search = new URLSearchParams(window.location.search);

      var token  = hash.get('access_token');
      var state  = hash.get('state')  || search.get('state');
      var error  = hash.get('error')  || search.get('error');

      if (window.opener && !window.opener.closed) {
        window.opener.postMessage(
          { type: 'gdrive_oauth_callback', access_token: token, state: state, error: error },
          window.location.origin
        );
      }

      // أغلق النافذة بعد إرسال الرسالة
      setTimeout(function () { window.close(); }, 300);
    })();
  </script>
</body>
</html>
